version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d finance_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GOLD_API_URL: ${GOLD_API_URL:-https://goldpricez.com/api/rates/currency/inr/measure/gram}
      GOLD_CACHE_TTL_SECONDS: ${GOLD_CACHE_TTL_SECONDS:-3600}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@finance.local}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── E7 async backbone (OPTIONAL for local dev) ─────────────────────────
  # Without these (and with REDIS_URL unset) the app runs tasks eagerly
  # in-process — identical behaviour, no extra services. Start them with:
  #   docker compose --profile async up
  # and set REDIS_URL=redis://redis:6379/0 in .env for the backend.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["async"]
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    restart: unless-stopped
    profiles: ["async"]
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    restart: unless-stopped
    profiles: ["async"]
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
