# Render.com Blueprint — deploys backend + frontend in one click
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: finance-tracker-db
    databaseName: finance_tracker
    user: admin
    plan: free

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: finance-tracker-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: CORS_ORIGINS
        value: https://finance-tracker-frontend.onrender.com
      - key: GOLD_API_URL
        value: https://goldpricez.com/api/rates/currency/inr/measure/gram
      - key: GOLD_CACHE_TTL_SECONDS
        value: 3600
      - key: SEED_ADMIN_USERNAME
        value: admin
      - key: SEED_ADMIN_PASSWORD
        sync: false          # set in dashboard — do not store plaintext
      - key: SEED_ADMIN_EMAIL
        value: admin@finance.local
      - key: GEMINI_API_KEY
        sync: false          # set in dashboard

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: finance-tracker-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://finance-tracker-backend.onrender.com