name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check backend changes
        id: backend_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Backend
        if: steps.backend_changes.outputs.changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: /home/ubuntu/Advanced_Finance_Tracker/deploy.sh

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: Check frontend changes
        id: frontend_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        if: steps.frontend_changes.outputs.changed == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install and Build
        if: steps.frontend_changes.outputs.changed == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm install
          npm run build
      - name: Deploy to Oracle VM
        if: steps.frontend_changes.outputs.changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/finance-frontend/"
          strip_components: 2
          rm: true
