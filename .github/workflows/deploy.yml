name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test_finance_tracker.db"
          SECRET_KEY: "ci-test-secret-key-min-32-chars-abcdefgh"
          APP_ENV: "development"
          GEMINI_API_KEY: ""
        run: pytest --tb=short -q

  # ── Frontend Tests ─────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  # ── Deploy Backend ─────────────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check backend changes
        id: backend_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^backend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Backend
        if: steps.backend_changes.outputs.changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: /home/ubuntu/Advanced_Finance_Tracker/deploy.sh

  # ── Deploy Frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check frontend changes
        id: frontend_changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v3
        if: steps.frontend_changes.outputs.changed == 'true'
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        if: steps.frontend_changes.outputs.changed == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Prepare remote directory
        if: steps.frontend_changes.outputs.changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/finance-frontend
            sudo chown -R ubuntu:ubuntu /var/www/finance-frontend

      - name: Deploy to Oracle VM
        if: steps.frontend_changes.outputs.changed == 'true'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/finance-frontend/"
          strip_components: 2
          rm: true
